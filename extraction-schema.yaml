## Schema Validation Rules

```yaml
validation_rules:
  required_fields:
    - "vulnerability.id"
    - "vulnerability.title"
    - "vulnerability.target.product"
    - "vulnerability.target.version_affected"
    - "vulnerability.classification.type"
    - "vulnerability.classification.severity"
    - "vulnerability.facts[]"
    - "vulnerability.facts[].claim"
    - "vulnerability.facts[].confidence"
    - "vulnerability.alternative_discovery_paths[]"
    - "vulnerability.heuristics"
    - "vulnerability.confidence_statements[]"
  
  confidence_values:
    fact: "FACT"
    inference: "INFERENCE"
    speculation: "SPECULATION"
  
  evidence_type_values:
    - "source_code"
    - "dynamic_analysis"
    - "runtime_trace"
    - "poc_output"
    - "vendor_advisory"
    - "cve_record"
  
  severity_values:
    - "Critical"
    - "High"
    - "Medium"
    - "Low"
    - "Informational"
```

---

## Usage Notes

1. **Extraction process:** Start with Phase 1 (Facts), then build the other sections
2. **Confidence labels:** Every claim must have an explicit confidence label
3. **Multi-finding entries:** Use `sub_findings: []` array for entries with multiple vulnerabilities
4. **Missing information:** Mark missing required fields as `null` with a comment explaining why
5. **Heuristics:** Extract from the vulnerability, not from general knowledge — each heuristic should be traceable to the specific finding

---

*This schema was derived from the Exploitarium vulnerability research methodology (Phase 1-6) and validated against 23 catalog entries. It is designed for both manual extraction and programmatic ingestion.*
