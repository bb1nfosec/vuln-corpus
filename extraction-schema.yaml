## Example: CVE-2026-55200 (libssh2 Packet Length Wrap)

```yaml
vulnerability:
  id: "CVE-2026-55200"
  title: "libssh2 ssh2_transport_read() Unchecked packet_length Integer Wraparound"
  aliases: []
  
  target:
    product: "libssh2"
    version_affected: "through 1.11.1"
    language: "C"
    operating_system: ["Linux", "Windows", "macOS"]
    component: "src/transport.c:ssh2_transport_read()"
    discovery_date: "2026-06-23"
  
  classification:
    cwe_id: "CWE-190"
    cve_id: "CVE-2026-55200"
    type: "Integer Overflow → Heap Buffer Overflow"
    severity: "Critical"
    cvss_vector: ""
    cvss_score: null
  
  facts:
    - claim: "total_num = 4; packet_length decoded from SSH header; only packet_length < 1 rejected"
      evidence_type: "source_code"
      source: "src/transport.c:~1050-1060"
      confidence: "FACT"
    - claim: "packet_length=0xffffffff, mac_len=0, auth_len=16 → allocation size = 19"
      evidence_type: "dynamic_analysis"
      source: "poc/cve_2026_55200_probe.c"
      confidence: "FACT"
    - claim: "Upstream fix adds packet_length > LIBSSH2_PACKET_MAXPAYLOAD guard"
      evidence_type: "source_code"
      source: "commit 97acf3dfda80c91c3a8c9f2372546301d4a1a7a8"
      confidence: "FACT"
  
  research_process:
    entry_point: "Review libssh2 transport layer for integer handling bugs"
    files_to_inspect:
      - "src/transport.c (ssh2_transport_read)"
    trust_boundaries:
      - "Network packet to internal state transition"
    invariants:
      - "Allocation sizes must match actual packet sizes"
    tools:
      - "gcc -std=c11 (arithmetic verifier)"
      - "Python (malicious SSH server scaffold)"
  
  research_timeline:
    - step: 1
      action: "Reviews libssh2 transport layer"
      detail: "Inspects ssh2_transport_read() for integer handling bugs"
    - step: 2
      action: "Traces size calculations"
      detail: "packet_length + mac_len + auth_len using 32-bit arithmetic"
    - step: 3
      action: "Computes wraparound case"
      detail: "0xffffffff + 0 + 16 wraps modulo 2^32 → allocation size = 19"
    - step: 4
      action: "Verifies rejection check"
      detail: "Only packet_length < 1 is checked, not overflow case"
    - step: 5
      action: "Builds arithmetic verifier"
      detail: "C program demonstrating the wrap in the vulnerable code path"
    - step: 6
      action: "Creates malicious SSH server"
      detail: "Python scaffold sending malformed encrypted packet"
    - step: 7
      action: "Builds local RCE harness"
      detail: "Models 19-byte allocation overflow into callback pointer"

  alternative_discovery_paths:
    - method: "Manual code review"
      confidence: "HIGH"
      rationale: "Integer wrap visible in transport parsing function"
    - method: "Static analysis"
      confidence: "HIGH"
      rationale: "Tools detecting 32-bit overflow in size calculations"
    - method: "Arithmetic fuzzing"
      confidence: "MEDIUM"
      rationale: "Fuzzer sending crafted packet_length values"
    - method: "CodeQL / Semgrep"
      confidence: "HIGH"
      rationale: "Query for '32-bit addition in allocation size context'"

  heuristics:
    always_inspect:
      - "32-bit integer arithmetic in size/allocation calculations"
      - "Operands from network packets in size computations"
    never_trust:
      - "Single boundary check (packet_length < 1) to prevent all overflows"
    watch_for:
      - "size_t promotion AFTER 32-bit arithmetic"
      - "Small allocation from wrapped input → large input used later"
    key_api_families:
      - "malloc/calloc size calculations"
      - "Protocol length field arithmetic"
    anti_patterns:
      - "'Small allocation from wrapped input' → 'large input used later'"

  confidence_statements:
    - statement: "Arithmetic verified in C with proof conditions"
      label: "FACT"
      rationale: "C program demonstrates exact vulnerable path"
    - statement: "Upstream fix confirmed"
      label: "FACT"
      rationale: "Commit 97acf3df linked from README"
    - statement: "Exploit reliability depends on target"
      label: "SPECULATION"
      rationale: "Depends on binary, allocator, mitigations — untested"
  
  technical_details:
    root_cause: "32-bit integer wraps when adding packet_length + mac_len + auth_len"
    entry_point_function: "ssh2_transport_read"
    affected_code_paths:
      - file: "src/transport.c"
        lines: "~1050-1070"
        function: "ssh2_transport_read"
    
    prerequisites:
      - "Attacker controls SSH server-to-client packet stream"
      - "Victim uses libssh2 through 1.11.1"
    
    impact: |
      Heap buffer overflow leading to potential remote code execution.
      19-byte allocation with controlled content overflow.
    
    exploit_primitive: "Integer wrap → undersized allocation → heap overflow"

  reproduction:
    environment:
      os: "Linux, macOS, Windows, WSL"
      dependencies: ["gcc", "libssh2 source"]
      build_steps:
        - "gcc -std=c11 -O0 -g -o probe poc/cve_2026_55200_probe.c"
        - "./probe"
    
    steps:
      - "Clone libssh2 source"
      - "Build arithmetic verifier with gcc"
      - "Run probe to confirm vulnerable32_allocation=19"
    
    expected_output: |
      vulnerable32_decision=accepted
      vulnerable32_allocation=19
      fixed32_decision=rejected: out of boundary
      result=PASS

  fix:
    patch_available: true
    patch_commit: "97acf3dfda80c91c3a8c9f2372546301d4a1a7a8"
    patch_description: "Add packet_length > LIBSSH2_PACKET_MAXPAYLOAD check before vulnerable addition"
    vendor_notified: true
    vendor_acknowledged: true
  
  references:
    - "https://www.cve.org/CVERecord?id=CVE-2026-55200"
    - "https://github.com/libssh2/libssh2/commit/97acf3dfda80c91c3a8c9f2372546301d4a1a7a8"
```

