# Exploitarium Vulnerability Extraction Schema
# Schema Version: 1.0
# Purpose: Standardized YAML format for extracting vulnerability information
#          using the structured research reconstruction methodology.
# Methodology: Facts → Research Timeline → Alternative Paths → Heuristics → Confidence

---

## Schema Definition

```yaml
# =============================================================================
# ROOT: One document per vulnerability entry
# =============================================================================
vulnerability:
  # --- METADATA (REQUIRED) ---
  id: ""                           # Entry ID or CVE (e.g., "entry-001", "CVE-2026-55200")
  title: ""                        # Brief vulnerability title
  aliases: []                      # Alternative identifiers (optional)
  
  # --- TARGET INFORMATION (REQUIRED) ---
  target:
    product: ""                    # Product name
    version_affected: ""           # Affected version(s)
    language: ""                   # Implementation language(s)
    operating_system: []           # Affected OSes
    component: ""                  # Affected component/module
    discovery_date: null           # ISO 8601 date
  
  # --- CLASSIFICATION (REQUIRED) ---
  classification:
    cwe_id: ""                     # CWE identifier (optional)
    cve_id: ""                     # CVE identifier (optional)
    type: ""                       # Vulnerability type
    severity: ""                   # Critical / High / Medium / Low
    cvss_vector: ""                # CVSS vector string (optional)
    cvss_score: null               # CVSS numeric score (optional)

  # --- PHASE 1: FACTS (REQUIRED) ---
  facts:
    - claim: ""                    # Observable, evidence-tethered statement
      evidence_type: ""            # "source_code" / "dynamic_analysis" / "runtime_trace" / "poc_output"
      source: ""                   # File path, log reference, or tool output
      confidence: "FACT"           # Always FACT in this section

  # --- PHASE 2: RESEARCH PROCESS (OPTIONAL) ---
  research_process:
    entry_point: ""                # Where would a researcher begin?
    files_to_inspect: []           # Key files/APIs to review
    trust_boundaries: []           # Key trust boundaries
    invariants: []                 # Important invariants
    tools: []                      # Useful tools (debuggers, fuzzers, analyzers)

  # --- PHASE 3: RESEARCH TIMELINE (OPTIONAL) ---
  research_timeline:
    - step: 1
      action: ""                   # "Notices..." / "Reads source..." / "Finds function..."
      detail: ""

  # --- PHASE 4: ALTERNATIVE DISCOVERY PATHS (REQUIRED) ---
  alternative_discovery_paths:
    - method: ""                   # e.g., "Manual code review", "Fuzzing", "Static analysis"
      confidence: ""               # HIGH / MEDIUM / LOW
      rationale: ""
  
  # --- PHASE 5: HUNTING HEURISTICS (REQUIRED) ---
  heuristics:
    always_inspect: []             # What to always look for
    never_trust: []                # What assumptions to reject
    watch_for: []                  # Specific signals
    key_api_families: []           # Important API categories
    anti_patterns: []              # Common developer mistakes
  
  # --- PHASE 6: CONFIDENCE (REQUIRED) ---
  confidence_statements:
    - statement: ""                # The claim being assessed
      label: ""                    # FACT / INFERENCE / SPECULATION
      rationale: ""                # Why this label was chosen

  # --- TECHNICAL DETAILS ---
  technical_details:
    root_cause: ""                 # Description of the root cause
    entry_point_function: ""       # Function where exploitation begins
    affected_code_paths:           # Source files and line ranges
      - file: ""
        lines: ""
        function: ""
    
    prerequisites: []              # Conditions required for exploitation
    impact: ""                     # Impact description
    exploit_primitive: ""          # e.g., "OOB-W", "UAF", "integer wrap"

  # --- REPRODUCTION ---
  reproduction:
    environment:
      os: ""
      dependencies: []
      build_steps: []
    
    steps: []                      # Step-by-step reproduction
    
    expected_output: ""            # Expected proof signal
  
  # --- FIX INFORMATION (OPTIONAL) ---
  fix:
    patch_available: false
    patch_commit: ""               # Commit hash
    patch_description: ""
    upstream_pr: ""                # PR link (optional)
    vendor_notified: false
    vendor_acknowledged: false
  
  # --- REFERENCES (OPTIONAL) ---
  references: []
```

