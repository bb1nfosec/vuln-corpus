## Example: Extraction from Hunting Heuristic (Auth Bypass)

```yaml
# This snippet shows how to encode a single heuristic as a reusable pattern
heuristic_pattern:
  id: "auth-001"
  name: "Unconditional verify_* function"
  category: "Authorization Bypass"
  
  signal:
    description: "verify_* functions that unconditionally return true"
    code_pattern: |
      function verify_*() {
          return true;  // ← no actual verification
      }
  
  examples:
    - target: "MyBB 1.8.40"
      code: "UserDataHandler::verify_usergroup() → return true"
      impact: "Limited ACP user → full Administrator"
  
  anti_pattern: |
    "The form shouldn't show admin groups, so we don't need to check"
    → Defense in depth violation
  
  remediation:
    - "Audit every verify_* function for actual authorization logic"
    - "Do not rely on UI-level restrictions for security"
    - "Enforce authorization at the data handler layer"
```

